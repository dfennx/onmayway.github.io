<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cool Web Project</title>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #EAEFFF;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #1A1A1A;
        }

        /* Görseli üstte ortalamak için */
        .ust-orta {
            display: flex;
            justify-content: center;
            padding-top: 20px;        /* Biraz daha az üst boşluk */
        }

        /* İyice küçültülmüş görsel */
        .kucuk-gorsel {
            width: 80px;     /* Daha da küçük! */
            height: auto;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <!-- Mini görsel üstte ortada -->
    <div class="ust-orta">
        <img src="img/OMW.png" alt="OMW Görseli" class="kucuk-gorsel">
    </div>

    <!-- İleride eklenecek içerik için alan -->
</body>
</html>
