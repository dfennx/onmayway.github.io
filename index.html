<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnMyWay</title>

    <!-- ---------- FAVICON LİNKLERİ ---------- -->
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="96x96" href="favicon/favicon-96x96.png">
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
    <!--  <--  Burada uzantılı logo dosyanızı ekliyoruz  --> -->
    <link rel="icon" type="image/png" href="favicon/favicon.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <meta name="theme-color" content="#ffffff">

    <!-- ---------- STYLES ---------- -->
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#00001E;
            min-height:100vh;
            font-family:sans-serif;
            color:#fff;
        }

        /* Header (logo) */
        .site-header{
            display:flex;
            align-items:center;
            padding:15px 20px;
        }
        .logo-link{display:inline-block;}
        .site-logo{
            height:50px;      /* ihtiyacınıza göre ayarlayın */
            width:auto;
        }
        @media(max-width:600px){
            .site-logo{height:40px;}
        }
    </style>
</head>
<body>

    <!-- ---------- LOGO HEADER ---------- -->
    <header class="site-header">
        <a href="/" class="logo-link">
            <!-- Uzantılı dosya adı burada -->
            <img src="favicon/favicon.png" alt="OnMyWay Logosu" class="site-logo">
        </a>
        <!-- Buraya menü, arama çubuğu vb. ekleyebilirsiniz -->
    </header>

    <!-- Sayfanın geri kalan içeriği -->
    
</body>
</html>
